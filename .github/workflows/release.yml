name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            source_ref="${GITHUB_REF_NAME}"
          else
            tag="${GITHUB_REF_NAME}"
            source_ref="${GITHUB_REF_NAME}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.source_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install DMG tooling
        run: npm install --global create-dmg

      - name: Prepare Sparkle signing key
        shell: bash
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is missing; cannot generate signed appcast.xml"
            exit 1
          fi
          key_path="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "SPARKLE_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build release assets
        shell: bash
        run: |
          ./release.sh
          test -f dist/appcast.xml

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "$TAG — Agent Island" \
              --notes "Automated Agent Island release."

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          version="${TAG#v}"
          gh release upload "$TAG" \
            "dist/AgentIsland-${version}.dmg" \
            "dist/appcast.xml" \
            --clobber
